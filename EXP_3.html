<!DOCTYPE html>
<html>
<head>
    <title>Portfolio - DOM Manipulation (Dark Theme)</title>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: Arial, sans-serif;
            transition: background 0.5s ease;
            background-color: #111827; /* default dark */
            color: white;
        }

        .container {
            display: flex;
            min-height: 100vh;
        }

        /* LEFT SECTION */
        .left {
            width: 30%;
            background: linear-gradient(to bottom, #ff512f, #dd2476);
            padding: 30px;
            text-align: center;
        }

        .left h2 {
            margin-bottom: 15px;
        }

        .left p {
            margin-bottom: 20px;
        }

        /* RIGHT SECTION */
        .right {
            width: 70%;
            padding: 30px;
        }

        .card {
            background-color: #1f2937;
            padding: 20px;
            margin-bottom: 20px;
            border-radius: 10px;
        }

        .card h3 {
            margin-bottom: 10px;
        }

        button {
            padding: 8px 15px;
            margin: 5px 0;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-size: 14px;
        }

        .btn-blue { background-color: #2563eb; color: white; }
        .btn-green { background-color: #16a34a; color: white; }
        .btn-purple { background-color: #7c3aed; color: white; }
        .btn-dark { background-color: #374151; color: white; }

        ul {
            margin-top: 10px;
            padding-left: 20px;
        }

        hr {
            margin: 20px 0;
            border: 0.5px solid white;
        }
    </style>
</head>

<body>

<div class="container">

    <div class="left">
        <h2>Hishita Sabhani</h2>

        <p id="description">
            My desire is to create immersive learning moments.
        </p>

        <button onclick="changeText()">Change Description</button>

        <hr>


     
        <h3>Change Background</h3>

<button class="btn-blue" onclick="changeColor('#001f3f')">Dark Blue</button>
<button class="btn-green" onclick="changeColor('#013220')">Dark Green</button>
<button class="btn-purple" onclick="changeColor('#2e003e')">Dark Purple</button>
<button class="btn-dark" onclick="changeColor('#111827')">Default Dark</button>
    </div>

    <!-- RIGHT SIDE -->
    <div class="right">

        <div class="card">
            <h3>Hobbies</h3>
            <p>Dancing is my favorite hobby and helps me express creativity.</p>
        </div>

        <div class="card">
            <h3>Dynamic Skills List</h3>

            <ul id="skillList"></ul>

            <button onclick="addItem()">Add Skill</button>
            <button onclick="removeItem()">Remove Last Skill</button>
        </div>

    </div>

</div>

<script>
 
    function changeText() {
        document.getElementById("description").innerText =
            "I love building interactive and creative web experiences!";
    }

   
    let count = 1;

    function addItem() {
        let ul = document.getElementById("skillList");

        let li = document.createElement("li");
        li.innerText = "Skill " + count;

        ul.appendChild(li);
        count++;
    }


    function removeItem() {
        let ul = document.getElementById("skillList");

        if (ul.lastElementChild) {
            ul.removeChild(ul.lastElementChild);
            count--;
        }
    }

    function changeColor(color) {
    document.querySelector(".right").style.backgroundColor = color;
}
</script>

</body>
</html>
